<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

    <body>
        <svg-thing>
            shape arrow {
                src: { x: float, y: float, },
                dst: { x: float, y: float, },
            }: {
                draw line {
                    src: src,
                    dst: src,
                };
            }

            var a = arrow {
                src: { x: 10.0, y: 12.0, },
                dst: { x: 100.0, y: 100.0, },
            };

            draw a;
        </svg-thing>
    </body>
